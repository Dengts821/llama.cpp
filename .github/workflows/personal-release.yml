name: Personal multi-platform release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Artifact version, for example v0.1.0"
        required: true
        default: "v0.1.0"
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: personal-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    if: github.repository == 'Dengts821/llama.cpp'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Validate version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
        run: |
          if [[ ! "$REQUESTED_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid version: $REQUESTED_VERSION"
            exit 1
          fi
          echo "version=$REQUESTED_VERSION" >> "$GITHUB_OUTPUT"

  linux-cpu:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x64
          - runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential libssl-dev

      - name: Toolchain workaround (GCC 14)
        if: ${{ contains(matrix.runner, 'ubuntu-24.04') }}
        run: |
          sudo apt-get install -y gcc-14 g++-14
          echo "CC=gcc-14" >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_BACKEND_DL=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_CPU_ALL_VARIANTS=ON \
            -DGGML_RPC=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_UI=OFF \
            -DLLAMA_USE_PREBUILT_UI=OFF \
            -DLLAMA_BUILD_TOOLS=ON

      - name: Build
        run: cmake --build build --config Release -j "$(nproc)"

      - name: Pack
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          cp LICENSE build/bin/
          tar -czf "llama-${VERSION}-bin-linux-${ARCH}-cpu.tar.gz" -C build/bin .

      - uses: actions/upload-artifact@v6
        with:
          name: linux-${{ matrix.arch }}-cpu
          path: llama-${{ needs.prepare.outputs.version }}-bin-linux-${{ matrix.arch }}-cpu.tar.gz
          retention-days: 7

  linux-cuda:
    needs: prepare
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    container: nvidia/cuda:12.4.1-devel-ubuntu22.04
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y --no-install-recommends build-essential ca-certificates cmake git libssl-dev

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_CUDA=ON \
            -DGGML_CUDA_CUB_3DOT2=ON \
            -DGGML_BACKEND_DL=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_CPU_ALL_VARIANTS=ON \
            -DGGML_RPC=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_UI=OFF \
            -DLLAMA_USE_PREBUILT_UI=OFF \
            -DLLAMA_BUILD_TOOLS=ON

      - name: Build
        run: cmake --build build --config Release -j "$(nproc)"

      - name: Pack
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          cp LICENSE build/bin/
          tar -czf "llama-${VERSION}-bin-linux-x64-cuda-12.4.tar.gz" -C build/bin .

      - uses: actions/upload-artifact@v6
        with:
          name: linux-x64-cuda-12.4
          path: llama-${{ needs.prepare.outputs.version }}-bin-linux-x64-cuda-12.4.tar.gz
          retention-days: 7

  windows-cpu:
    needs: prepare
    runs-on: windows-2022
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Configure
        run: >-
          cmake -S . -B build -A x64
          -DCMAKE_BUILD_TYPE=Release
          -DGGML_BACKEND_DL=ON
          -DGGML_NATIVE=OFF
          -DGGML_CPU_ALL_VARIANTS=ON
          -DGGML_RPC=ON
          -DLLAMA_BUILD_BORINGSSL=ON
          -DLLAMA_BUILD_TESTS=OFF
          -DLLAMA_BUILD_EXAMPLES=OFF
          -DLLAMA_BUILD_SERVER=ON
          -DLLAMA_BUILD_UI=OFF
          -DLLAMA_USE_PREBUILT_UI=OFF
          -DLLAMA_BUILD_TOOLS=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Pack
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          Copy-Item LICENSE build/bin/Release/
          Compress-Archive -Path build/bin/Release/* -DestinationPath "llama-$env:VERSION-bin-windows-x64-cpu.zip"

      - uses: actions/upload-artifact@v6
        with:
          name: windows-x64-cpu
          path: llama-${{ needs.prepare.outputs.version }}-bin-windows-x64-cpu.zip
          retention-days: 7

  windows-cuda:
    needs: prepare
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Install CUDA 12.4
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: "12.4"

      - name: Install Ninja
        run: choco install ninja --no-progress

      - name: Configure and build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          cmake -S . -B build -G "Ninja Multi-Config" ^
            -DGGML_CUDA=ON ^
            -DGGML_CUDA_CUB_3DOT2=ON ^
            -DGGML_BACKEND_DL=ON ^
            -DGGML_NATIVE=OFF ^
            -DGGML_CPU_ALL_VARIANTS=ON ^
            -DGGML_RPC=ON ^
            -DLLAMA_BUILD_BORINGSSL=ON ^
            -DLLAMA_BUILD_TESTS=OFF ^
            -DLLAMA_BUILD_EXAMPLES=OFF ^
            -DLLAMA_BUILD_SERVER=ON ^
            -DLLAMA_BUILD_UI=OFF ^
            -DLLAMA_USE_PREBUILT_UI=OFF ^
            -DLLAMA_BUILD_TOOLS=ON
          cmake --build build --config Release

      - name: Pack
        shell: pwsh
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          Copy-Item LICENSE build/bin/Release/
          Get-ChildItem "$env:CUDA_PATH/bin" -File -Recurse |
            Where-Object { $_.Name -like "cudart64_*.dll" -or $_.Name -like "cublas64_*.dll" -or $_.Name -like "cublasLt64_*.dll" } |
            Copy-Item -Destination build/bin/Release/
          Compress-Archive -Path build/bin/Release/* -DestinationPath "llama-$env:VERSION-bin-windows-x64-cuda-12.4.zip"

      - uses: actions/upload-artifact@v6
        with:
          name: windows-x64-cuda-12.4
          path: llama-${{ needs.prepare.outputs.version }}-bin-windows-x64-cuda-12.4.zip
          retention-days: 7

  macos:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            arch: arm64
            cmake_args: -DGGML_METAL_USE_BF16=ON -DGGML_METAL_EMBED_LIBRARY=ON
          - runner: macos-15-intel
            arch: x64
            cmake_args: -DGGML_METAL=OFF -DCMAKE_OSX_DEPLOYMENT_TARGET=13.3
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - name: Configure
        env:
          PLATFORM_ARGS: ${{ matrix.cmake_args }}
        run: |
          cmake -S . -B build \
            $PLATFORM_ARGS \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_RPATH='@loader_path' \
            -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_RPC=ON \
            -DLLAMA_BUILD_BORINGSSL=ON \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_SERVER=ON \
            -DLLAMA_BUILD_UI=OFF \
            -DLLAMA_USE_PREBUILT_UI=OFF \
            -DLLAMA_BUILD_TOOLS=ON

      - name: Build
        run: cmake --build build --config Release -j "$(sysctl -n hw.logicalcpu)"

      - name: Pack
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          cp LICENSE build/bin/
          tar -czf "llama-${VERSION}-bin-macos-${ARCH}.tar.gz" -C build/bin .

      - uses: actions/upload-artifact@v6
        with:
          name: macos-${{ matrix.arch }}
          path: llama-${{ needs.prepare.outputs.version }}-bin-macos-${{ matrix.arch }}.tar.gz
          retention-days: 7

  release:
    if: github.repository == 'Dengts821/llama.cpp' && startsWith(github.ref, 'refs/tags/v')
    needs:
      - prepare
      - linux-cpu
      - linux-cuda
      - windows-cpu
      - windows-cuda
      - macos
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: release
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t files < <(find release -maxdepth 1 -type f -print)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release files found"
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" "${files[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes \
            --title "$GITHUB_REF_NAME"
